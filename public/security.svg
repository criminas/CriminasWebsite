<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#arcGradient)" opacity="0.1"/>
  
  <!-- Outer Arc Ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#arcGradient)" stroke-width="3" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#arcGradient)" stroke-width="2" opacity="0.2"/>
  
  <!-- Shield Shape -->
  <path d="M 200 80 L 260 110 L 260 180 Q 260 240 200 280 Q 140 240 140 180 L 140 110 Z" 
        fill="url(#shieldGradient)" 
        stroke="#667eea" 
        stroke-width="2"
        filter="url(#glow)"/>
  
  <!-- Inner Shield Detail -->
  <path d="M 200 100 L 245 120 L 245 175 Q 245 220 200 255 Q 155 220 155 175 L 155 120 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.4"/>
  
  <!-- Magnifying Glass Handle -->
  <line x1="235" y1="225" x2="270" y2="260" 
        stroke="#667eea" 
        stroke-width="8" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Magnifying Glass Lens -->
  <circle cx="220" cy="210" r="25" 
          fill="none" 
          stroke="#667eea" 
          stroke-width="6"
          filter="url(#glow)"/>
  <circle cx="220" cy="210" r="20" 
          fill="rgba(255,255,255,0.1)" 
          stroke="none"/>
  
  <!-- Search Highlight Effect -->
  <circle cx="215" cy="205" r="8" 
          fill="rgba(255,255,255,0.6)" 
          stroke="none"/>
  
  <!-- Binary Data Stream (left side) -->
  <text x="60" y="140" font-family="monospace" font-size="12" fill="#667eea" opacity="0.3">101</text>
  <text x="65" y="160" font-family="monospace" font-size="10" fill="#764ba2" opacity="0.3">010</text>
  <text x="55" y="180" font-family="monospace" font-size="11" fill="#667eea" opacity="0.3">110</text>
  <text x="60" y="200" font-family="monospace" font-size="12" fill="#764ba2" opacity="0.3">011</text>
  
  <!-- Binary Data Stream (right side) -->
  <text x="325" y="150" font-family="monospace" font-size="12" fill="#667eea" opacity="0.3">001</text>
  <text x="320" y="170" font-family="monospace" font-size="10" fill="#764ba2" opacity="0.3">111</text>
  <text x="330" y="190" font-family="monospace" font-size="11" fill="#667eea" opacity="0.3">100</text>
  <text x="325" y="210" font-family="monospace" font-size="12" fill="#764ba2" opacity="0.3">010</text>
  
  <!-- Scan Lines -->
  <line x1="120" y1="160" x2="180" y2="160" stroke="#00f2fe" stroke-width="1" opacity="0.2"/>
  <line x1="220" y1="180" x2="280" y2="180" stroke="#00f2fe" stroke-width="1" opacity="0.2"/>
  <line x1="120" y1="200" x2="180" y2="200" stroke="#00f2fe" stroke-width="1" opacity="0.2"/>
  
  <!-- Center Dot Pattern -->
  <circle cx="200" cy="180" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="195" cy="175" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="205" cy="175" r="1.5" fill="#ffffff" opacity="0.4"/>
  
  <!-- Text: ArcOSINT -->
  <text x="200" y="340" 
        font-family="Arial, sans-serif" 
        font-size="42" 
        font-weight="bold" 
        fill="url(#arcGradient)" 
        text-anchor="middle"
        letter-spacing="2">ArcOSINT</text>
  
  <!-- Subtitle -->
  <text x="200" y="365" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        fill="#667eea" 
        text-anchor="middle"
        opacity="0.8"
        letter-spacing="1">ADVANCED INTELLIGENCE</text>
</svg>
