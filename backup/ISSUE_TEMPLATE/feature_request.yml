name: Feature Request
description: Suggest a new feature or improvement.
labels: enhancement
body:
  - type: markdown
    attributes:
      value: Have an idea? We'd love to hear it! Please fill out this template to propose your feature.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the feature.
      placeholder: A clear and concise summary of the feature
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Describe the problem this feature solves or the motivation behind it.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions you've considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the feature request here, like mockups or links to related issues.